<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!--
  When libass (via ffmpeg's ass= filter) requests sans-serif, prepend Rounded M+ 1m for ARIB
  so ARIB subtitles render with the ARIB-optimised rounded gothic typeface.
  Using <match> + mode="prepend" binding="strong" because <alias><prefer> can be
  overridden by pre-existing Debian generic-alias rules.
-->
<fontconfig>
  <match target="pattern">
    <test qual="any" name="family">
      <string>sans-serif</string>
    </test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Rounded M+ 1m for ARIB</string>
    </edit>
  </match>
</fontconfig>
