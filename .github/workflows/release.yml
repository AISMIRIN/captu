name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  github-release:
    name: create GitHub release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        run: gh release create "$GITHUB_REF_NAME" --generate-notes --verify-tag
        env:
          GH_TOKEN: ${{ github.token }}
