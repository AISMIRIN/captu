name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    name: fmt / clippy / test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive  # required: crates/aribcaption-sys/vendor/libaribcaption

      # C++ build deps — matches docker/Dockerfile builder-base
      - name: Install system deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            pkg-config libssl-dev \
            cmake clang libclang-dev g++ \
            libfreetype6-dev libfontconfig1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --all --check

      - name: cargo clippy
        env:
          SQLX_OFFLINE: "true"
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        env:
          SQLX_OFFLINE: "true"
        run: cargo test --workspace

  docker:
    name: build & push (GHCR)
    needs: [test]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive  # required: vendor/libaribcaption is in the build context

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: runtime
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-dependabot-prs:
    name: rebase open Dependabot PRs onto main
    needs: [docker]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.DEPENDABOT_SYNC_APP_ID }}
          private-key: ${{ secrets.DEPENDABOT_SYNC_APP_PRIVATE_KEY }}

      - name: Update open Dependabot PR branches
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          # List open PRs authored by Dependabot, then update each branch.
          # The App-token push re-triggers the PR's CI — unlike GITHUB_TOKEN which
          # is suppressed by GitHub's recursive-workflow protection.
          prs=$(gh pr list --repo "$REPO" --state open --json number,author \
            --jq '.[] | select(.author.login=="app/dependabot") | .number')
          for n in $prs; do
            echo "::group::Updating PR #$n"
            gh pr update-branch "$n" --repo "$REPO" \
              || echo "PR #$n: update failed (likely conflict) — skipping"
            echo "::endgroup::"
          done
