name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    name: fmt / clippy / test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive  # required: crates/aribcaption-sys/vendor/libaribcaption

      # C++ build deps — matches docker/Dockerfile builder-base
      - name: Install system deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            pkg-config libssl-dev \
            cmake clang libclang-dev g++ \
            libfreetype6-dev libfontconfig1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --all --check

      - name: cargo clippy
        env:
          SQLX_OFFLINE: "true"
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        env:
          SQLX_OFFLINE: "true"
        run: cargo test --workspace

  coverage:
    name: coverage gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive  # required: crates/aribcaption-sys/vendor/libaribcaption

      # C++ build deps — same as the test job
      - name: Install system deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            pkg-config libssl-dev \
            cmake clang libclang-dev g++ \
            libfreetype6-dev libfontconfig1-dev

      # Nightly is required for #[coverage(off)] via coverage_attribute (not yet stable).
      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      # Separate cache key so llvm-cov RUSTFLAGS don't pollute the stable build cache.
      - uses: Swatinem/rust-cache@v2
        with:
          key: llvm-cov

      - name: cargo llvm-cov (gate)
        env:
          SQLX_OFFLINE: "true"
        run: |
          cargo llvm-cov --workspace \
            --ignore-filename-regex 'crates/aribcaption-sys/(vendor|src/bindings)' \
            --fail-under-lines 80 \
            --html

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-html
          path: target/llvm-cov/html

  docker:
    name: build & push (${{ matrix.platform }})
    needs: [test]
    if: github.event_name != 'pull_request'
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive  # required: vendor/libaribcaption is in the build context

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          target: runtime
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-merge:
    name: merge multi-arch manifest (GHCR)
    needs: [docker]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: digests-*
          merge-multiple: true
          path: /tmp/digests

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create and push multi-arch manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE }}@sha256:%s ' *)

      - name: Inspect manifest
        run: |
          docker buildx imagetools inspect ${{ env.IMAGE }}:${{ steps.meta.outputs.version }}

  update-dependabot-prs:
    name: rebase open Dependabot PRs onto main
    needs: [docker-merge]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.DEPENDABOT_SYNC_APP_ID }}
          private-key: ${{ secrets.DEPENDABOT_SYNC_APP_PRIVATE_KEY }}

      - name: Update open Dependabot PR branches
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          # List open PRs authored by Dependabot, then update each branch.
          # The App-token push re-triggers the PR's CI — unlike GITHUB_TOKEN which
          # is suppressed by GitHub's recursive-workflow protection.
          prs=$(gh pr list --repo "$REPO" --state open --json number,author \
            --jq '.[] | select(.author.login=="app/dependabot") | .number')
          for n in $prs; do
            echo "::group::Updating PR #$n"
            gh pr update-branch "$n" --repo "$REPO" \
              || echo "PR #$n: update failed (likely conflict) — skipping"
            echo "::endgroup::"
          done
